name: Build GPCS4

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  SOLUTION_FILE_PATH: .
  VULKAN_SDK_VERSION: 1.4.341.1

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Vulkan SDK
      uses: humbletim/install-vulkan-sdk@v1.2
      id: vulkan
      with:
        version: ${{ env.VULKAN_SDK_VERSION }}
        cache: true

    - name: Install LLVM
      run: choco install llvm -y

    - name: Setup Developer Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configure Paths and LLVM Fix
      shell: pwsh
      run: |
        $vk_sdk = "${{ steps.vulkan.outputs.VULKAN_SDK }}"
        Add-Content -Path $env:GITHUB_PATH -Value "$vk_sdk\Bin"
        Add-Content -Path $env:GITHUB_ENV -Value "VULKAN_SDK=$vk_sdk"

        $llvm_path = "C:\Program Files\LLVM"
        $llvm_ver = (clang --version | Select-String -Pattern "\d+\.\d+\.\d+").Matches.Value
        $llvm_major = $llvm_ver.Split('.')[0]
        
        $lib_path = "$llvm_path\lib\clang\$llvm_major"
        if (Test-Path $lib_path) { 
            Rename-Item -Path $lib_path -NewName "$llvm_ver" -ErrorAction SilentlyContinue 
        }

        Add-Content -Path $env:GITHUB_ENV -Value "LLVM_PATH=$llvm_path"
        Add-Content -Path $env:GITHUB_ENV -Value "LLVM_VERSION=$llvm_ver"
        
        $props = "<Project><PropertyGroup><LLVMInstallDir>$llvm_path</LLVMInstallDir><LLVMToolsVersion>$llvm_ver</LLVMToolsVersion></PropertyGroup></Project>"
        Set-Content -Path .\Directory.build.props -Value $props

    - name: Verify Tools
      run: |
        glslc --version
        clang-cl --version

    - name: Build
      shell: cmd
      run: |
        msbuild /m /p:Configuration=Debug /t:Rebuild /p:LatestTargetPlatformVersion=true ${{env.SOLUTION_FILE_PATH}}
        msbuild /m /p:Configuration=Release /t:Rebuild /p:LatestTargetPlatformVersion=true ${{env.SOLUTION_FILE_PATH}}
         
    - name: Setup git hash
      run: |
         for /f "tokens=*" %%i in ('git rev-parse --short HEAD') do set GIT_HASH=%%i
         echo GIT_HASH_SHORT=%GIT_HASH% >> %GITHUB_ENV%
      shell: cmd

    - name: Upload build files
      uses: actions/upload-artifact@v4
      with:
        name: gpcs4-${{ env.GIT_HASH_SHORT }}
        path: |
          x64
          !x64/**/*.pdb
          !x64/**/*.lib
        if-no-files-found: error
