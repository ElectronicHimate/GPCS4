name: Build GPCS4

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  SOLUTION_FILE_PATH: .
  VULKAN_VERSION: 1.3.296.0

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Download and Extract Vulkan SDK
      shell: pwsh
      run: |
        $url = "https://sdk.lunarg.com/sdk/download/${{ env.VULKAN_VERSION }}/windows/VulkanSDK-${{ env.VULKAN_VERSION }}-Installer.exe"
        $out = "$env:GITHUB_WORKSPACE\vulkansdk_install.exe"
        $dest = "$env:GITHUB_WORKSPACE\VULKAN_SDK"
        
        Write-Host "Downloading Vulkan SDK ${{ env.VULKAN_VERSION }} from $url..."
        
        # Using -UseBasicParsing to avoid IE engine dependencies on runners
        Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
        
        Write-Host "Extracting SDK to $dest..."
        # Extracting specifically the Include and Lib folders to save time/space
        & "7z" x $out "-o$dest" Include Lib Bin -y
        
        if (Test-Path "$dest\Include\vulkan\vulkan.h") {
            Write-Host "Vulkan SDK successfully extracted."
            Add-Content -Path $env:GITHUB_ENV -Value "VULKAN_ROOT=$dest"
        } else {
            Write-Error "Extraction failed. Listing root of installer contents:"
            & "7z" l $out
            exit 1
        }

    - name: Install LLVM
      run: choco install llvm -y

    - name: Setup Developer Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configure Paths and LLVM Fix
      shell: pwsh
      run: |
        $llvm_path = "C:\Program Files\LLVM"
        $actual_folder = Get-ChildItem -Path "$llvm_path\lib\clang" | Where-Object { $_.PSIsContainer } | Select-Object -ExpandProperty Name -First 1
        $major_ver = $actual_folder.Split('.')[0]
        $link_path = "$llvm_path\lib\clang\$major_ver"
        $target_path = "$llvm_path\lib\clang\$actual_folder"
        if ($major_ver -ne $actual_folder) {
            if (-not (Test-Path $link_path)) { New-Item -ItemType Junction -Path $link_path -Target $target_path }
        }
        $props = @"
        <Project>
          <PropertyGroup>
            <LLVMInstallDir>$llvm_path</LLVMInstallDir>
            <LLVMToolsVersion>$actual_folder</LLVMToolsVersion>
          </PropertyGroup>
        </Project>
        "@
        Set-Content -Path .\Directory.build.props -Value $props

    - name: Build
      shell: cmd
      run: |
        :: Force the compiler to see our manual extraction folders
        set "CL=/I"%VULKAN_ROOT%\Include" %CL%"
        set "LINK=/LIBPATH:"%VULKAN_ROOT%\Lib" %LINK%"
        
        msbuild /m /p:Configuration=Release /t:Rebuild /p:LatestTargetPlatformVersion=true ${{env.SOLUTION_FILE_PATH}}
          
    - name: Setup git hash
      run: |
         for /f "tokens=*" %%i in ('git rev-parse --short HEAD') do set GIT_HASH=%%i
         echo GIT_HASH_SHORT=%GIT_HASH% >> %GITHUB_ENV%
      shell: cmd

    - name: Upload build files
      uses: actions/upload-artifact@v4
      with:
        name: gpcs4-${{ env.GIT_HASH_SHORT }}
        path: |
          x64
          !x64/**/*.pdb
          !x64/**/*.lib
        if-no-files-found: error
